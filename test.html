<!DOCTYPE html>
<html>
<head>
    <title>HR Dashboard Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }
        .status {
            background: #10B981;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            display: inline-block;
            margin: 20px 0;
        }
        .links {
            margin-top: 30px;
        }
        a {
            color: white;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 20px;
            border-radius: 10px;
            margin: 0 10px;
            display: inline-block;
            transition: all 0.3s;
        }
        a:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 StoryHouse HR Dashboard</h1>
        <div class="status">✅ Server Running on Port 3002</div>
        <p>Elite productivity dashboard for team management</p>
        
        <div class="links">
            <a href="http://localhost:3002/">Open Dashboard</a>
            <a href="http://192.168.1.210:3002/">Open via IP</a>
        </div>
        
        <div style="margin-top: 30px; font-size: 0.9em; opacity: 0.8;">
            <p>If links don't work, try:</p>
            <p>1. Hard refresh (Cmd+Shift+R)</p>
            <p>2. Incognito mode</p>
            <p>3. Check Brave extensions</p>
        </div>
    </div>
</body>
</html>
